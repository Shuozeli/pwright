# x-search.yaml -- Search X.com (Twitter) and extract results.
#
# Type: query (read-only, safe)
# Auth: YES -- must be logged into X.com in the Chrome instance
# Tested: 2026-03-21 (X.com React UI with data-testid attributes)
#
# Usage:
#   pwright script run examples/recipes/research/social/x-search.yaml --param query="rust lang"
#   pwright script run examples/recipes/research/social/x-search.yaml --param query="breaking news" --param tab=live

name: "X Search"
version: 1
type: query

params:
  query:
    type: string
    required: true
    description: "Search query"
  tab:
    type: string
    default: "top"
    description: "Search tab: top, live (latest), people, media"

config:
  default_timeout_ms: 15000

scripts:
  check_login: |
    (() => {
      const nav = document.querySelector('nav[role="navigation"]');
      if (!nav) return 'no_navigation';
      const links = Array.from(nav.querySelectorAll('a')).map(a => a.getAttribute('aria-label') || '');
      if (links.some(l => l === 'Profile')) return 'logged_in';
      return 'logged_out';
    })()

  extract_results: |
    (() => {
      const tweets = document.querySelectorAll('[data-testid="tweet"]');
      const results = [];
      for (const t of tweets) {
        const parts = (t.querySelector('[data-testid="User-Name"]')?.innerText || '').split('\n');
        const likesLabel = t.querySelector('[data-testid="like"]')?.getAttribute('aria-label') || '';
        const retweetsLabel = t.querySelector('[data-testid="retweet"]')?.getAttribute('aria-label') || '';
        results.push({
          displayName: parts[0] || '',
          handle: parts[1] || '',
          time: parts[3] || '',
          text: (t.querySelector('[data-testid="tweetText"]')?.innerText || '').slice(0, 500),
          likes: parseInt(likesLabel) || 0,
          retweets: parseInt(retweetsLabel) || 0,
          link: t.querySelector('a[href*="/status/"]')?.href || null,
          verified: !!t.querySelector('[data-testid="icon-verified"]'),
        });
      }
      return JSON.stringify(results);
    })()

steps:
  - goto: "https://x.com/search?q={{ query }}&src=typed_query&f={{ tab }}"
    wait_for: "nav[role='navigation']"
  - wait: 2000
  - eval:
      ref: check_login
      save_as: login_status
    on_error: continue
  - wait: 2000
  - eval:
      ref: extract_results
      save_as: results
  - output:
      source: "X.com Search"
      query: "{{ query }}"
      tab: "{{ tab }}"
      login_status: "{{ login_status }}"
      results: "{{ results }}"
