# Local development: Chrome + Lightpanda + Firefox on host network, tests run from cargo.
# Usage: docker compose -f docker-compose.local.yml up -d
#        cargo test -p pwright-integration-tests -- --ignored --test-threads=1
#        docker compose -f docker-compose.local.yml down
services:
  chrome:
    image: chromedp/headless-shell:latest
    network_mode: host
    shm_size: "2gb"
  lightpanda:
    image: lightpanda/browser:nightly
    ports:
      - "9333:9222"
  # Firefox requires network_mode: host because its CDP validates the Host
  # header port matches --remote-debugging-port. Use FIREFOX_WS_URL env var
  # when running tests locally (see README).
  # NOTE: Cannot run Chrome + Firefox simultaneously on same host (port 9222 conflict).
  # Use profiles to pick one:
  #   docker compose -f docker-compose.local.yml --profile firefox up -d
  firefox:
    build:
      context: .
      dockerfile: firefox.Dockerfile
    network_mode: host
    shm_size: "2gb"
    profiles: ["firefox"]
    volumes:
      - /tmp/firefox-cdp:/tmp/firefox-cdp
