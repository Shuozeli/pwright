# Lightpanda integration tests.
# CI: docker compose -f docker-compose.lightpanda.yml up --build --abort-on-container-exit --exit-code-from test-runner
services:
  lightpanda:
    image: lightpanda/browser:nightly

  test-runner:
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile
    depends_on:
      - lightpanda
    environment:
      LIGHTPANDA_HOST: lightpanda
      LIGHTPANDA_PORT: "9222"
    command: >
      sh -c '
        echo "Lightpanda at $$LIGHTPANDA_HOST:$$LIGHTPANDA_PORT" &&
        for i in $$(seq 1 60); do
          curl -sf "http://$$LIGHTPANDA_HOST:$$LIGHTPANDA_PORT/json/version" > /dev/null 2>&1 && break;
          sleep 1; echo "  waiting for Lightpanda... ($$i/60)";
        done &&
        exec cargo test -p pwright-integration-tests --test lightpanda -- --ignored --test-threads=1
      '
