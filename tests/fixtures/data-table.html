<!DOCTYPE html>
<html>
<head><title>Data Table</title></head>
<body>
  <h1>Product Pricing</h1>
  <table id="pricing">
    <thead>
      <tr><th>Product</th><th>Price</th><th>Stock</th></tr>
    </thead>
    <tbody>
      <tr><td>Widget A</td><td>$10.00</td><td>150</td></tr>
      <tr><td>Widget B</td><td>$25.50</td><td>42</td></tr>
      <tr><td>Widget C</td><td>$7.99</td><td>300</td></tr>
      <tr><td>Widget D</td><td>$99.00</td><td>5</td></tr>
    </tbody>
  </table>
</body>
</html>
