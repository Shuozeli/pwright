<!DOCTYPE html>
<html>
<head><title>Input Page</title></head>
<body>
  <input id="text" type="text" placeholder="Enter text" />
  <input id="email" type="email" placeholder="Enter email" />
  <input id="password" type="password" placeholder="Enter password" />
  <textarea id="area" placeholder="Enter multiline text"></textarea>
  <input id="checkbox" type="checkbox" />
  <input id="radio1" type="radio" name="group" value="a" />
  <input id="radio2" type="radio" name="group" value="b" />
  <select id="select">
    <option value="one">One</option>
    <option value="two">Two</option>
    <option value="three">Three</option>
  </select>
  <button id="submit" data-testid="submit-btn">Submit</button>
</body>
</html>
