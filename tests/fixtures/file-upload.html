<!DOCTYPE html>
<html>
<head><title>File Upload Test</title></head>
<body>
  <h1>File Upload</h1>
  <input type="file" id="file-input" />
  <div id="status">No file selected</div>
  <script>
    document.getElementById('file-input').addEventListener('change', function() {
      const name = this.files && this.files.length > 0
        ? this.files[0].name
        : this.getAttribute('data-files-set') || 'No file selected';
      document.getElementById('status').textContent = name;
    });
  </script>
</body>
</html>
